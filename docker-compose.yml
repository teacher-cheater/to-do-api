services:
    mysql:
        image: mysql:8.0
        container_name: todo_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: todo
            MYSQL_USER: todo
            MYSQL_PASSWORD: root
            MYSQL_ROOT_PASSWORD: root
        ports:
            - '3306:3306'
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    'localhost',
                    '-uroot',
                    '-proot',
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    phpmyadmin:
        image: phpmyadmin:5
        container_name: todo_phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            PMA_USER: root
            PMA_PASSWORD: root
        ports:
            - '8080:80'
        depends_on:
            mysql:
                condition: service_healthy

    swagger-ui:
        image: swaggerapi/swagger-ui
        container_name: todo_swagger
        restart: unless-stopped
        environment:
            SWAGGER_JSON: /docs/openapi.yaml
            BASE_URL: /
        volumes:
            - ./docs/openapi.yaml:/docs/openapi.yaml:ro
        ports:
            - '8081:8080'

volumes:
    mysql_data:
